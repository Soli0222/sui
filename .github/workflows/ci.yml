name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v6.0.7
        with:
          run_install: false

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: make lint

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v6.0.7
        with:
          run_install: false

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run typecheck
        run: make typecheck

  test-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v6.0.7
        with:
          run_install: false

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: make test-unit

  test-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v6.0.7
        with:
          run_install: false

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run integration tests
        run: make test-integration

  test-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PORT: "3100"
      VITE_API_BASE: http://localhost:3100

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v6.0.7
        with:
          run_install: false

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Playwright browser cache
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: make test-e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: playwright-artifacts
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7

  test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v6.0.7
        with:
          run_install: false

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run build
        run: make build

  performance:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out base
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Check out head
        uses: actions/checkout@v6.0.2
        with:
          path: head

      - uses: pnpm/action-setup@v6.0.7
        with:
          package_json_file: head/package.json
          run_install: false

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.15.0
          cache: pnpm
          cache-dependency-path: head/pnpm-lock.yaml

      - name: Prepare base benchmark harness
        run: |
          mkdir -p base/packages/backend/src/performance
          cp -R head/packages/backend/src/performance/. base/packages/backend/src/performance/
          cp head/packages/backend/vitest.performance.config.ts base/packages/backend/vitest.performance.config.ts
          cp head/Makefile base/Makefile

      - name: Install base dependencies
        working-directory: base
        run: pnpm install --frozen-lockfile

      - name: Measure base
        working-directory: base
        run: make test-performance PERF_OUTPUT=${{ github.workspace }}/base-performance.json PERF_COMMIT=${{ github.event.pull_request.base.sha }}

      - name: Install head dependencies
        working-directory: head
        run: pnpm install --frozen-lockfile

      - name: Measure head
        working-directory: head
        run: make test-performance PERF_OUTPUT=${{ github.workspace }}/head-performance.json PERF_COMMIT=${{ github.event.pull_request.head.sha }}

      - name: Compare performance
        id: compare
        working-directory: head
        continue-on-error: true
        run: pnpm --filter @sui/backend performance:compare ${{ github.workspace }}/base-performance.json ${{ github.workspace }}/head-performance.json ${{ github.workspace }}/performance-comment.md

      - name: Comment performance result
        if: always()
        uses: marocchino/sticky-pull-request-comment@v2
        continue-on-error: true
        with:
          header: performance
          path: performance-comment.md

      - name: Upload performance artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: performance-results
          path: |
            base-performance.json
            head-performance.json
            performance-comment.md
          if-no-files-found: ignore
          retention-days: 14

      - name: Fail on performance regression
        if: steps.compare.outcome == 'failure'
        run: exit 1

  test-docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      REGISTRY: ghcr.io
      TAGS: latest

    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64

    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"
          echo "REGISTRY_IMAGE=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Check out the repo
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.REGISTRY_IMAGE }}
          tags: ${{ env.TAGS }}

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          push: false
          platforms: ${{ matrix.platform }}
          provenance: false
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
