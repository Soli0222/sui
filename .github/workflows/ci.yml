name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v6.0.3
        with:
          run_install: false

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v6.0.3
        with:
          run_install: false

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @sui/db db:generate

      - name: Run typecheck
        run: pnpm typecheck

  test-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v6.0.3
        with:
          run_install: false

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test

  test-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://sui_test:sui_test@localhost:5555/sui_test
    services:
      postgres:
        image: postgres:18.3
        env:
          POSTGRES_USER: sui_test
          POSTGRES_PASSWORD: sui_test
          POSTGRES_DB: sui_test
        ports:
          - 5555:5432
        options: >-
          --health-cmd="pg_isready -U sui_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v6.0.3
        with:
          run_install: false

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @sui/db db:generate

      - name: Run database migrations
        run: pnpm --filter @sui/db prisma:migrate

      - name: Run integration tests
        run: pnpm --filter @sui/backend test:integration

  test-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: postgresql://sui_test:sui_test@localhost:5555/sui_test
      PORT: "3100"
      VITE_API_BASE: http://localhost:3100
    services:
      postgres:
        image: postgres:18.3
        env:
          POSTGRES_USER: sui_test
          POSTGRES_PASSWORD: sui_test
          POSTGRES_DB: sui_test
        ports:
          - 5555:5432
        options: >-
          --health-cmd="pg_isready -U sui_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v6.0.3
        with:
          run_install: false

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Playwright browser cache
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Generate Prisma client
        run: pnpm --filter @sui/db db:generate

      - name: Run database migrations
        run: pnpm --filter @sui/db prisma:migrate

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: playwright-artifacts
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7

  test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v6.0.3
        with:
          run_install: false

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run build
        run: pnpm build

  test-docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      REGISTRY: ghcr.io
      TAGS: latest

    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64

    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"
          echo "REGISTRY_IMAGE=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Check out the repo
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.REGISTRY_IMAGE }}
          tags: ${{ env.TAGS }}

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          push: false
          platforms: ${{ matrix.platform }}
          provenance: false
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
