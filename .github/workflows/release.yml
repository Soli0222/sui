name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 1.8.0 or 1.8.0-rc.1
        required: true
        type: string

permissions:
  actions: write
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      GH_TOKEN: ${{ github.token }}
      VERSION: ${{ inputs.version }}
      PORT: "3100"
      VITE_API_BASE: http://localhost:3100

    steps:
      - name: Check out main
        uses: actions/checkout@v7.0.0
        with:
          ref: main
          fetch-depth: 0

      - name: Validate release input
        run: |
          set -euo pipefail

          if [[ "$VERSION" == v* ]]; then
            echo "Use ${VERSION#v}; release tags in this repository do not use a v prefix." >&2
            exit 1
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Version must be SemVer like 1.8.0, 1.8.0-rc.1, or 1.8.0-beta.1." >&2
            exit 1
          fi

          git fetch --tags --force

          if git rev-parse -q --verify "refs/tags/$VERSION" >/dev/null; then
            echo "Tag $VERSION already exists." >&2
            exit 1
          fi

          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "GitHub Release $VERSION already exists." >&2
            exit 1
          fi

      - uses: pnpm/action-setup@v6.0.9
        with:
          run_install: false

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24.17.0
          cache: pnpm

      - name: Set package versions
        run: make version-set VERSION="$VERSION"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check package versions
        run: make version-check VERSION="$VERSION"

      - name: Run lint
        run: make lint

      - name: Run typecheck
        run: make typecheck

      - name: Run unit tests
        run: make test-unit

      - name: Run build
        run: make build

      - name: Run integration tests
        run: make test-integration

      - name: Restore Playwright browser cache
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: make test-e2e

      - name: Commit release version
        id: commit
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add package.json packages/*/package.json

          if git diff --cached --quiet; then
            echo "No version changes to commit; tagging current HEAD."
          else
            git commit -m "chore(release): $VERSION"
          fi

          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Push release commit and tag
        run: |
          set -euo pipefail

          git tag "$VERSION"
          git push origin HEAD:main
          git push origin "refs/tags/$VERSION"

      - name: Create GitHub Release
        run: |
          set -euo pipefail

          args=("$VERSION" --verify-tag --title "$VERSION" --generate-notes)
          if [[ "$VERSION" == *-* ]]; then
            args+=(--prerelease)
          fi

          gh release create "${args[@]}"

          {
            echo "Released $VERSION"
            echo "Commit: ${{ steps.commit.outputs.sha }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Dispatch publish workflows
        run: |
          set -euo pipefail

          workflows=(
            "docker.yaml"
            "mcp-docker.yaml"
            "mcp-publish.yml"
          )
          release_sha="${{ steps.commit.outputs.sha }}"

          for workflow in "${workflows[@]}"; do
            echo "Dispatching ${workflow} for ${VERSION}"
            gh workflow run "$workflow" --ref "$VERSION"
          done

          for workflow in "${workflows[@]}"; do
            run_id=""

            for _ in {1..30}; do
              run_id=$(gh run list \
                --workflow "$workflow" \
                --event workflow_dispatch \
                --json databaseId,headSha \
                --jq ".[] | select(.headSha == \"${release_sha}\") | .databaseId" | head -n 1)

              if [ -n "$run_id" ]; then
                break
              fi

              sleep 2
            done

            if [ -z "$run_id" ]; then
              echo "Could not find dispatched run for ${workflow} at ${release_sha}." >&2
              exit 1
            fi

            echo "Watching ${workflow} run ${run_id}"
            gh run watch "$run_id" --exit-status
          done
